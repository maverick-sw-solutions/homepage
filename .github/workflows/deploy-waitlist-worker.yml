name: Deploy waitlist worker

on:
  push:
    branches: [main]
    paths:
      - "workers/tupijua-waitlist/**"
      - ".github/workflows/deploy-waitlist-worker.yml"
  workflow_dispatch:

concurrency:
  group: deploy-waitlist-worker
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4"
          workingDirectory: workers/tupijua-waitlist
          command: deploy --config wrangler.toml
